<!DOCTYPE html>
<html>
<head>
  <title>Novacare Hospital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logoBox">
      <img src="logo.png">
      <h2>Novacare</h2>
      <span>Islamabad</span>
    </div>

    <ul>
      <li onclick="showSection('overview')" class="active">🏠 Overview</li>
      <li onclick="showSection('patients')">🧑 Patients</li>
      <li onclick="showSection('tests')">🧪 Tests</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <h2>Welcome back, Admin 👋</h2>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="section">

      <div class="cards">
        <div class="card purple">
          <h3>Total Patients</h3>
          <h1 id="total">0</h1>
        </div>

        <div class="card blue">
          <h3>Waiting</h3>
          <h1 id="waiting">0</h1>
        </div>

        <div class="card green">
          <h3>In Consultation</h3>
          <h1 id="consult">0</h1>
        </div>

        <div class="card orange">
          <h3>Tests Pending</h3>
          <h1 id="tests">0</h1>
        </div>
      </div>

      <!-- TABLE -->
      <div class="panel">
        <h3>Recent Patients</h3>
        <div id="recentPatients"></div>
      </div>

    </div>

    <!-- PATIENTS -->
    <div id="patients" class="section hidden">
      <h2>All Patients</h2>
      <div id="patientCards" class="cards"></div>
    </div>

    <!-- TESTS -->
    <div id="tests" class="section hidden">
      <h2>Pending Tests</h2>
      <div id="testData"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
